# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: crossoverJie's Blog
subtitle: baller
description: You never know what you can do till you try.
author: crossoverJie
language: en #原有的jacman zh-CN
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://crossoverjie.top/
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
#theme: next
theme: fluid

# Deployment
## Docs: https://hexo.io/docs/deployment.html

deploy:
  type: git
  repo:
	  #github: git@github.com:crossoverJie/crossoverJie.github.io.git,master
    github: git@github.com:crossoverJie/crossoverJie.github.io.git
	  #coding: git@git.coding.net:crossoverJie/crossoverJie.git,master

# Extensions
Plugins:
- hexo-generator-sitemap

# 自动生成sitemap
sitemap:
  path: sitemap.xml
baidusitemap:
  path: baidusitemap.xml

# 主题next的头像
avatar: /uploads/logo.jpg

image_stream:
  #jquery: //cdn.bootcss.com/jquery/2.1.0/jquery.min.js
  jquery: false
  jquery_lazyload: //cdn.bootcss.com/jquery.lazyload/1.9.1/jquery.lazyload.min.js
  img_placeholder: //ww4.sinaimg.cn/large/e724cbefgw1etyppy7bgwg2001001017.gif

# 主题next的多说配置
#duoshuo_shortname: crossoverjie
